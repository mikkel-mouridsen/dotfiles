# ── Hyprland main config ─────────────────────────────────────────
# Modular sources — edit individual files rather than this one.

source = ~/.config/hypr/colors.conf      # Catppuccin Mocha (hardcoded)
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/input.conf
source = ~/.config/hypr/animations.conf
source = ~/.config/hypr/rules.conf
source = ~/.config/hypr/autostart.conf
source = ~/.config/hypr/binds.conf

# ── Environment ────────────────────────────────────────────────
env = GTK_THEME,catppuccin-mocha-mauve-standard+default
env = XCURSOR_THEME,Adwaita
env = XCURSOR_SIZE,24

# ── General ──────────────────────────────────────────────────────
general {
    gaps_in        = 8
    gaps_out       = 28
    border_size    = 2
    col.active_border   = $border_active
    col.inactive_border = $border_inactive
    layout         = dwindle
    resize_on_border = true
}

# ── Decoration ───────────────────────────────────────────────────
decoration {
    rounding         = 12
    active_opacity   = 0.92
    inactive_opacity = 0.85

    blur {
        enabled            = true
        size               = 10
        passes             = 4
        new_optimizations  = true
        noise              = 0.02
        vibrancy           = 0.2
        vibrancy_darkness  = 0.3
        popups             = true
        popups_ignorealpha = 0.3
    }

    shadow {
        enabled        = true
        range          = 25
        offset         = 0, 4
        color          = rgba(00000088)
        color_inactive = rgba(00000055)
    }
}

# ── Misc ─────────────────────────────────────────────────────────
misc {
    disable_hyprland_logo    = true
    disable_splash_rendering = true
    force_default_wallpaper  = 0
}

# ── Dwindle layout ───────────────────────────────────────────────
dwindle {
    pseudotile    = true
    preserve_split = true
}
