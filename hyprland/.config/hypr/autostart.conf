# ── Autostart ────────────────────────────────────────────────────
# exec-once runs once at Hyprland startup (not on config reload).

# Wallpaper daemon (needed before swww img calls)
exec-once = swww-daemon

# Quickshell bar + panels (handles notifications, launcher, power menu)
exec-once = quickshell

# Idle / lock daemon
exec-once = hypridle

# Kanata for laptop keyboard (service started by systemd, but keep as fallback)
# exec-once = kanata --cfg ~/.config/kanata/laptop.kbd

# XDG portal (needed for screen sharing, file pickers)
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
