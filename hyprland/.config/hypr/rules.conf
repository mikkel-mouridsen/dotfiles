# ── Window Rules (Hyprland 0.54+ block syntax) ──────────────────

# Float common utility windows
windowrule {
    name = float-pavucontrol
    match:class = pavucontrol
    float = yes
}

windowrule {
    name = float-thunar
    match:class = thunar
    float = yes
}

windowrule {
    name = float-file-roller
    match:class = file-roller
    float = yes
}

windowrule {
    name = float-nm-connection-editor
    match:class = nm-connection-editor
    float = yes
}

windowrule {
    name = float-blueman-manager
    match:class = blueman-manager
    float = yes
}

# Picture-in-picture
windowrule {
    name = pip-float
    match:title = Picture-in-Picture
    float = yes
    pin = true
    keep_aspect_ratio = true
}

# Suppress maximize requests from all apps
windowrule {
    name = suppress-maximize
    match:class = .*
    suppress_event = maximize
}

# ── Layer Rules — frosted glass blur-behind ───────────────────────
layerrule {
    name = blur-bar
    match:namespace = bar
    blur = true
    ignore_alpha = 0.2
}

layerrule {
    name = blur-launcher
    match:namespace = launcher
    blur = true
    ignore_alpha = 0.2
}

layerrule {
    name = blur-power-menu
    match:namespace = power-menu
    blur = true
    ignore_alpha = 0.2
}

layerrule {
    name = blur-notifications
    match:namespace = notifications
    blur = true
    ignore_alpha = 0.2
}
