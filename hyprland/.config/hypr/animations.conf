# ── Animations ───────────────────────────────────────────────────
animations {
    enabled = true

    bezier = easeOutExpo,   0.16, 1,    0.3,  1
    bezier = easeInOutQuad, 0.45, 0,    0.55, 1
    bezier = overshot,      0.05, 0.9,  0.1,  1.05
    bezier = smoothIn,      0.25, 1,    0.5,  1
    bezier = gentle,        0.4,  0,    0.2,  1

    animation = windows,     1, 5,  overshot,      slide
    animation = windowsOut,  1, 5,  easeOutExpo,   slide
    animation = windowsMove, 1, 4,  easeInOutQuad
    animation = border,      1, 6,  easeOutExpo
    animation = fade,        1, 4,  easeOutExpo
    animation = layers,      1, 3,  smoothIn,      fade
    animation = workspaces,  1, 6,  easeOutExpo,   slide
}
