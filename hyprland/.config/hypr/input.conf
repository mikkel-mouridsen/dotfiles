# ── Input ────────────────────────────────────────────────────────
input {
    kb_layout  = us
    kb_options = # leave empty — kanata handles all key remapping

    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        natural_scroll    = true
        tap-to-click      = true
        drag_lock         = false
        disable_while_typing = true
    }
}

# ── Gestures ─────────────────────────────────────────────────────
gesture = 3, horizontal, workspace
