# This config is a STUB! This should never be generated.
# Use the default lua config from https://github.com/hyprwm/Hyprland/blob/main/example/hyprland.lua

exec-once = qs -c noctalia-shell
exec-once = fcitx5 -d --replace

# Monitors: Samsung 1440p144 on the left, ASUS 1080p on the right (bottom-aligned).
# Samsung occupies x=0..2560, ASUS sits at x=2560 with y=360 so its bottom (360+1080=1440)
# matches the Samsung's bottom — no invisible wall when the cursor crosses over.
monitor = DP-1, 2560x1440@144, 0x0, 1
monitor = HDMI-A-1, 1920x1080@60, 2560x360, 1

# Big monitor (DP-1) owns workspace 1; small monitor defaults to 2.
workspace = 1, monitor:DP-1, default:true
workspace = 2, monitor:HDMI-A-1, default:true

general {
  gaps_in = 5
  gaps_out = 10
}

decoration {
  rounding = 20
  rounding_power = 2

  shadow {
    enabled = true
    range = 4
    render_power = 3
    color = rgba(1a1a1aee)
  }

  blur {
    enabled = true
    size = 3
    passes = 2
    vibrancy = 0.1696
  }
}

# Noctalia background blur
layerrule {
  name = noctalia
  match:namespace = noctalia-background-.*$
  ignore_alpha = 0.5
  blur = true
  blur_popups = true
}

$mod = ALT
$terminal = ghostty
$fileManager = nautilus
$noctalia = qs -c noctalia-shell ipc call

# ── Applications ─────────────────────────────────────────────────
# Cycle keyboard layout: English -> Danish -> Japanese (via fcitx5)
bind = CTRL, space, exec, ~/.config/hypr/cycle-keyboard-layout.sh

bind = $mod,       Return, exec, $terminal
bind = $mod SHIFT, Return, exec, [float; size 60% 70%; center] $terminal
bind = $mod,       E,      exec, $fileManager
bind = $mod,       B,      exec, brave
bind = $mod,       D,      exec, $noctalia launcher toggle
bind = $mod,       N,      exec, $noctalia controlCenter toggle
bind = $mod SHIFT, E,      exec, $noctalia sessionMenu toggle

# ── Window management ────────────────────────────────────────────
bind = $mod,       Q,      killactive
bind = $mod SHIFT, F,      fullscreen, 0
bind = $mod,       F,      fullscreen, 1
bind = $mod SHIFT, V,      togglefloating
bind = $mod,       P,      pseudo

# ── Grouping (tabbed window stacks) ──────────────────────────────
bind = $mod,       G,      togglegroup
bind = $mod,       Tab,    changegroupactive, f
bind = $mod SHIFT, Tab,    changegroupactive, b
bind = $mod SHIFT, G,      moveoutofgroup
bind = $mod CTRL SHIFT, H, moveintogroup, l
bind = $mod CTRL SHIFT, J, moveintogroup, d
bind = $mod CTRL SHIFT, K, moveintogroup, u
bind = $mod CTRL SHIFT, L, moveintogroup, r

# ── Focus (vim keys) ─────────────────────────────────────────────
bind = $mod, H, movefocus, l
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, L, movefocus, r

# ── Move windows ─────────────────────────────────────────────────
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, J, movewindow, d
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, L, movewindow, r

# ── Resize ───────────────────────────────────────────────────────
binde = $mod CTRL, H, resizeactive, -40 0
binde = $mod CTRL, J, resizeactive, 0 40
binde = $mod CTRL, K, resizeactive, 0 -40
binde = $mod CTRL, L, resizeactive, 40 0

# ── Workspaces ───────────────────────────────────────────────────
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# ── Scroll through workspaces ────────────────────────────────────
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1

# ── Mouse window control ─────────────────────────────────────────
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ── Lock ─────────────────────────────────────────────────────────
bind = $mod SHIFT, X, exec, $noctalia lockScreen lock

# ── Media / volume ───────────────────────────────────────────────
bind = , XF86AudioRaiseVolume, exec, $noctalia volume increase
bind = , XF86AudioLowerVolume, exec, $noctalia volume decrease
bind = , XF86AudioMute, exec, $noctalia volume muteOutput
bind = , XF86MonBrightnessUp, exec, $noctalia brightness increase
bind = , XF86MonBrightnessDown, exec, $noctalia brightness decrease
bind = , XF86AudioPlay, exec, $noctalia media playPause
bind = , XF86AudioNext, exec, $noctalia media next
bind = , XF86AudioPrev, exec, $noctalia media previous
