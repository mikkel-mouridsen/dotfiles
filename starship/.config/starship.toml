palette = "catppuccin_mocha"

format = """
$directory\
$git_branch\
$git_status\
$git_metrics\
$c\
$python\
$nodejs\
$rust\
$golang\
$java\
$cmake\
$aws\
$jobs\
$fill\
$cmd_duration\
$time\
$line_break\
$character"""

[character]
success_symbol = "[❯](lavender)"
error_symbol = "[❯](red)"

[directory]
style = "bold blue"
truncation_length = 3
truncation_symbol = "…/"

[git_branch]
symbol = " "
style = "bold mauve"

[git_status]
style = "bold maroon"
format = '([$all_status$ahead_behind]($style) )'

[cmd_duration]
min_time = 2000
style = "bold yellow"
format = "[$duration]($style) "

[fill]
symbol = " "

[c]
symbol = " "
detect_extensions = ["c", "cpp", "h", "hpp"]
style = "bold blue"

[python]
symbol = " "
style = "bold yellow"

[nodejs]
symbol = " "
style = "bold green"

[rust]
symbol = "🦀 "
style = "bold peach"

[golang]
symbol = " "
style = "bold teal"

[java]
symbol = " "
style = "bold red"

[aws]
force_display = true
format = 'on [$symbol$profile]($style) '
style = "bold blue"
symbol = "☁️ "

[git_metrics]
disabled = false
format = '([+$added]($added_style) )([-$deleted]($deleted_style) )'
added_style = "bold green"
deleted_style = "bold red"

[jobs]
symbol = "󰜎 "
style = "bold peach"
threshold = 1

[time]
disabled = false
format = "[$time]($style)"
style = "overlay1"
time_format = "%H:%M"

[cmake]
symbol = "△ "
style = "bold blue"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"
