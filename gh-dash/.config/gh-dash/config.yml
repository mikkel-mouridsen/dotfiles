# ── Sections ──────────────────────────────────────────────────────
prSections:
  - title: My Pull Requests
    filters: is:open author:@me
  - title: Needs My Review
    filters: is:open review-requested:@me
  - title: Involved
    filters: is:open involves:@me -author:@me

issuesSections:
  - title: My Issues
    filters: is:open author:@me
  - title: Assigned
    filters: is:open assignee:@me
  - title: Involved
    filters: is:open involves:@me -author:@me

notificationsSections:
  - title: All
    filters: ""
  - title: Created
    filters: reason:author
  - title: Participating
    filters: reason:participating
  - title: Mentioned
    filters: reason:mention
  - title: Review Requested
    filters: reason:review-requested
  - title: Assigned
    filters: reason:assign
  - title: Subscribed
    filters: reason:subscribed
  - title: Team Mentioned
    filters: reason:team-mention

# ── Keybindings ───────────────────────────────────────────────────
keybindings:
  universal:
    - key: g
      command: >
        r={{.RepoName}}; r=${r##*/};
        p=$([ -d "$HOME/dev/$r" ] && echo "$HOME/dev/$r" || echo "$HOME/repos/$r");
        cd "$p" && lazygit
  prs:
    - key: C
      command: >
        r={{.RepoName}}; r=${r##*/};
        p=$([ -d "$HOME/dev/$r" ] && echo "$HOME/dev/$r" || echo "$HOME/repos/$r");
        tmux new-window -n 'review-{{.PrNumber}}' -c "$p" &&
        tmux send-keys 'claude "/pr-review-toolkit:review-pr {{.PrNumber}}"' Enter

# ── Defaults ──────────────────────────────────────────────────────
repo:
  branchesRefetchIntervalSeconds: 30
  prsRefetchIntervalSeconds: 60

defaults:
  preview:
    open: true
    width: 70
  prsLimit: 20
  issuesLimit: 20
  notificationsLimit: 20
  view: prs
  layout:
    prs:
      updatedAt:
        width: 5
      createdAt:
        width: 5
      repo:
        width: 20
      author:
        width: 15
      authorIcon:
        hidden: false
      assignees:
        width: 20
        hidden: true
      base:
        width: 15
        hidden: true
      lines:
        width: 15
    issues:
      updatedAt:
        width: 5
      createdAt:
        width: 5
      repo:
        width: 15
      creator:
        width: 10
      creatorIcon:
        hidden: false
      assignees:
        width: 20
        hidden: true
  refetchIntervalMinutes: 30

# ── Theme (Catppuccin Mocha) ──────────────────────────────────────
theme:
  ui:
    sectionsShowCount: true
    table:
      showSeparator: true
      compact: true
  colors:
    text:
      primary: "#cdd6f4"
      secondary: "#a6adc8"
      inverted: "#1e1e2e"
      faint: "#6c7086"
      warning: "#fab387"
      success: "#a6e3a1"
    background:
      selected: "#45475a"
    border:
      primary: "#89b4fa"
      secondary: "#585b70"
      faint: "#313244"

confirmQuit: false
showAuthorIcons: true
smartFilteringAtLaunch: true
