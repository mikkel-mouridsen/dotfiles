# ── Greeter compositor (minimal) ─────────────────────────────────
# Used only by greetd to host regreet. No decorations, no keybinds.

monitor = , preferred, auto, 1.6

misc {
    disable_hyprland_logo    = true
    disable_splash_rendering = true
    force_default_wallpaper  = 0
}

animations {
    enabled = false
}

decoration {
    blur {
        enabled = false
    }
    shadow {
        enabled = false
    }
}

input {
    kb_layout = us
}

cursor {
    no_hardware_cursors = true
}

exec-once = regreet; hyprctl dispatch exit
