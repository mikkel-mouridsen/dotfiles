# Matugen Material You theme — generated, do not edit

# Colors
matugen_bg="{{colors.background.default.hex}}"
matugen_fg="{{colors.on_surface.default.hex}}"
matugen_primary="{{colors.primary.default.hex}}"
matugen_on_primary="{{colors.on_primary.default.hex}}"
matugen_surface="{{colors.surface.default.hex}}"
matugen_surface_container="{{colors.surface_container.default.hex}}"
matugen_outline_variant="{{colors.outline_variant.default.hex}}"
matugen_on_surface_variant="{{colors.on_surface_variant.default.hex}}"

# Status bar
set -g status-style "bg=default,fg=#{matugen_fg}"
set -g status-left "#[fg=#{matugen_on_primary},bg=#{matugen_primary},bold]  #S #[fg=#{matugen_primary},bg=default,nobold] "
set -g status-left-length 30
set -g status-right "#[fg=#{matugen_on_surface_variant}] %H:%M #[fg=#{matugen_primary}]#[fg=#{matugen_on_primary},bg=#{matugen_primary}] #h "
set -g status-right-length 50

# Window tabs
set -g window-status-format "#[fg=#{matugen_on_surface_variant}]  #I #W "
set -g window-status-current-format "#[fg=#{matugen_on_primary},bg=#{matugen_primary},bold]  #I #W #[fg=#{matugen_primary},bg=default,nobold]"
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#{matugen_outline_variant}"
set -g pane-active-border-style "fg=#{matugen_primary}"

# Messages and mode
set -g message-style "bg=#{matugen_surface_container},fg=#{matugen_fg}"
set -g mode-style "bg=#{matugen_primary},fg=#{matugen_on_primary}"

# Bell
set -g window-status-bell-style "fg=#{matugen_primary},bold"
