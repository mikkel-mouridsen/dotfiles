# Matugen Material You theme — generated, do not edit
# Powerline overlapping segments

# ── Color Palette ─────────────────────────────────────────────────
matugen_bg="{{colors.background.default.hex}}"
matugen_fg="{{colors.on_surface.default.hex}}"
matugen_primary="{{colors.primary.default.hex}}"
matugen_on_primary="{{colors.on_primary.default.hex}}"
matugen_secondary="{{colors.secondary.default.hex}}"
matugen_on_secondary="{{colors.on_secondary.default.hex}}"
matugen_surface="{{colors.surface.default.hex}}"
matugen_surface_container="{{colors.surface_container.default.hex}}"
matugen_surface_container_high="{{colors.surface_container_high.default.hex}}"
matugen_outline_variant="{{colors.outline_variant.default.hex}}"
matugen_on_surface_variant="{{colors.on_surface_variant.default.hex}}"

# ── Status Bar ────────────────────────────────────────────────────
set -g status-position top
set -g status-style "bg=default,fg=#{matugen_fg}"
set -g status-justify left
set -g status-left-length 40
set -g status-right-length 60

# ── Left Status ───────────────────────────────────────────────────
set -g status-left "#[fg=#{matugen_on_primary},bg=#{matugen_primary},bold]   #S #[fg=#{matugen_primary},bg=default] "

# ── Right Status ──────────────────────────────────────────────────
set -g status-right "#[fg=#{matugen_surface_container_high},bg=default]#[fg=#{matugen_on_surface_variant},bg=#{matugen_surface_container_high}]  %H:%M #[fg=#{matugen_primary},bg=#{matugen_surface_container_high}]#[fg=#{matugen_on_primary},bg=#{matugen_primary},bold]  %a %d "

# ── Window Tabs ───────────────────────────────────────────────────
set -g window-status-format "#[fg=#{matugen_surface_container_high},bg=default]#[fg=#{matugen_on_surface_variant},bg=#{matugen_surface_container_high}] #I #W #[fg=#{matugen_surface_container_high},bg=default] "
set -g window-status-current-format "#[fg=#{matugen_primary},bg=default]#[fg=#{matugen_on_primary},bg=#{matugen_primary},bold] #I #W #[fg=#{matugen_primary},bg=default] "
set -g window-status-separator ""

# ── Pane Borders ──────────────────────────────────────────────────
set -g pane-border-style "fg=#{matugen_outline_variant}"
set -g pane-active-border-style "fg=#{matugen_primary}"

# ── Messages & Modes ─────────────────────────────────────────────
set -g message-style "bg=#{matugen_surface_container},fg=#{matugen_fg}"
set -g mode-style "bg=#{matugen_primary},fg=#{matugen_on_primary}"

# ── Clock ─────────────────────────────────────────────────────────
set -g clock-mode-colour "#{matugen_primary}"

# ── Popup ─────────────────────────────────────────────────────────
set -g popup-border-style "fg=#{matugen_primary}"
set -g popup-style "bg=#{matugen_surface_container}"

# ── Bell ──────────────────────────────────────────────────────────
set -g window-status-bell-style "fg=#{matugen_primary},bold"
