general {
    disable_loading_bar = true
    hide_cursor         = true
    grace               = 0
    no_fade_in          = false
}

background {
    monitor  =
    path     = screenshot
    blur_size   = 12
    blur_passes = 3
    brightness  = 0.65
    vibrancy    = 0.15
    noise       = 0.02
}

input-field {
    monitor  =
    size     = 280, 50
    outline_thickness = 2
    dots_size     = 0.25
    dots_spacing  = 0.3
    outer_color   = rgba({{colors.primary.default.hex_stripped}}40)
    inner_color   = rgba({{colors.surface.default.hex_stripped}}cc)
    font_color    = rgb({{colors.on_surface.default.hex_stripped}})
    fade_on_empty = true
    placeholder_text = <i>Password…</i>
    rounding = 12
    position = 0, -80
    halign   = center
    valign   = center
}

label {
    monitor  =
    text     = cmd[update:1000] echo "<b>$(date +"%H:%M")</b>"
    color    = rgba({{colors.on_surface.default.hex_stripped}}ff)
    font_size = 64
    font_family = MonaspiceNe Nerd Font Bold
    shadow_passes = 2
    position = 0, 100
    halign   = center
    valign   = center
}

label {
    monitor  =
    text     = $USER
    color    = rgba({{colors.on_surface.default.hex_stripped}}cc)
    font_size = 16
    font_family = MonaspiceNe Nerd Font
    position = 0, 40
    halign   = center
    valign   = center
}
