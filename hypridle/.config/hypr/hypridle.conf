# ── hypridle config ───────────────────────────────────────────────

general {
    lock_cmd    = pidof hyprlock || hyprlock    # don't spawn a second hyprlock
    before_sleep_cmd = loginctl lock-session    # lock before suspend
    after_sleep_cmd  = hyprctl dispatch dpms on # turn screen back on after resume
}

# Dim screen after 2.5 minutes
listener {
    timeout  = 150
    on-timeout  = brightnessctl -s set 20%
    on-resume   = brightnessctl -r
}

# Lock after 5 minutes
listener {
    timeout  = 300
    on-timeout  = loginctl lock-session
}

# Turn off screen after 5.5 minutes (30 s after lock)
listener {
    timeout  = 330
    on-timeout  = hyprctl dispatch dpms off
    on-resume   = hyprctl dispatch dpms on
}

# Suspend after 30 minutes
listener {
    timeout  = 1800
    on-timeout  = systemctl suspend
}
