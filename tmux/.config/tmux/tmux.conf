# ── Terminal & General ────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm*:Tc"
# Undercurl support (for Neovim diagnostics, etc.)
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

set -g mouse on
set -g history-limit 1000000
set -sg escape-time 0
set -g focus-events on
set -g detach-on-destroy off
set -g set-clipboard on

# ── Bell / Notifications ────────────────────────────────────────
# Highlight windows in the status bar when they ring the bell
set -g monitor-bell on
set -g bell-action other          # only alert for non-focused windows
set -g visual-bell off            # don't flash the terminal

# Start windows and panes at 1
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
setw -g pane-base-index 1

# ── Prefix ───────────────────────────────────────────────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ── Window Navigation ────────────────────────────────────────────
bind -n M-H previous-window
bind -n M-L next-window

# ── Vim-style Pane Splits ────────────────────────────────────────
# v = vertical split (side by side), s = horizontal split (stacked)
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
# Also open new windows in the current path
bind c new-window -c "#{pane_current_path}"

# ── Vim-style Pane Resizing ──────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Vim-style Copy Mode ─────────────────────────────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v   send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y   send-keys -X copy-selection-and-cancel

# ── Catppuccin Config ────────────────────────────────────────────
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_status_background "default"

# ── Plugins ──────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'fcsonline/tmux-thumbs'

# ── Plugin Config ─────────────────────────────────────────────────
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'

set -g @sessionx-bind 'o'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-auto-accept 'off'
set -g @sessionx-filter-current 'false'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'

set -g @floax-bind 'p'
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'magenta'
set -g @floax-text-color 'blue'
set -g @floax-change-path 'true'

set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

# ── Status Bar (after catppuccin loads) ──────────────────────────
run '~/.tmux/plugins/tpm/tpm'

set -ga status-right "#{E:@catppuccin_status_session}"

# Prevent programs and tmux from overwriting manual window names
# (must be after TPM so tmux-sensible doesn't override)
set -g allow-rename off
setw -g automatic-rename off
